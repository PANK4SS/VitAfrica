spring.application.name=backend

# ==================== DATABASE CONFIGURATION ====================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/vitafrica_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==================== SERVER CONFIGURATION ====================
server.address=0.0.0.0
server.port=${SERVER_PORT:8080}

# ==================== JPA/HIBERNATE CONFIGURATION ====================
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# ==================== DEFAULT ROLE ====================
app.default.role=USER

# ==================== JWT Configuration ====================
app.jwt.secret=${JWT_SECRET:local_dev_secret_key}
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# ==================== FILE UPLOAD Configuration ====================
app.upload.dir=uploads
app.base.url=${APP_BASE_URL:http://192.168.100.202:8080}
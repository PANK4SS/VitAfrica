services:

  mysql:
    image: mysql:8.0
    container_name: vitafrica_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: vitafrica_db
      MYSQL_USER: auth_user
      MYSQL_PASSWORD: auth_user_2026
    ports:
      - "3307:3306"       # ← 3307 pour éviter le conflit avec MySQL local
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - vitafrica_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-u", "root", "-proot", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20          # ← plus de tentatives
      start_period: 30s    # ← attendre 30s avant de commencer les checks

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: vitafrica_backend
    restart: on-failure    # ← redémarre seulement en cas d'erreur, pas en boucle infinie
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/vitafrica_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: auth_user
      SPRING_DATASOURCE_PASSWORD: auth_user_2026
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      mysql:
        condition: service_healthy   # ← attend que MySQL soit healthy
    networks:
      - vitafrica_network

volumes:
  mysql_data:

networks:
  vitafrica_network:
    driver: bridge
spring.application.name=backend

# ==================== DATABASE ====================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/vitafrica_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==================== SERVER ====================
server.address=0.0.0.0
server.port=${SERVER_PORT:8080}

# ==================== JPA ====================
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ==================== ROLES ====================
app.default.role=USER

# ==================== JWT ====================
app.jwt.secret=${JWT_SECRET:local_dev_secret_key_minimum_32_chars_long}
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# ==================== FILE UPLOAD ====================
app.upload.dir=${APP_UPLOAD_DIR:uploads}
app.base.url=${APP_BASE_URL:http://localhost:8080}

# ==================== SECURITY ====================
app.security.dev-mode=${APP_SECURITY_DEV_MODE:false}


# Force Swagger à utiliser HTTPS
springdoc.swagger-ui.url=https://vitafrica-production.up.railway.app/v3/api-docs
server.forward-headers-strategy=framework

# Détecte HTTPS derrière le reverse proxy Railway
server.forward-headers-strategy=framework

# Force le scheme HTTPS pour OpenAPI
springdoc.swagger-ui.url=/v3/api-docs
springdoc.api-docs.url=/v3/api-docs

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
spring.application.name=backend

# ==================== DATABASE CONFIGURATION ====================
spring.datasource.url=jdbc:mysql://localhost:3306/auth_rbac_db
spring.datasource.username=auth_user
spring.datasource.password=auth_user_2026
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==================== SERVER CONFIGURATION ====================
server.address=0.0.0.0
server.port=${SERVER_PORT:9090}

# ==================== JPA/HIBERNATE CONFIGURATION ====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# ==================== DEFAULT ROLE ====================
app.default.role=USER

# ==================== JWT Configuration ====================
app.jwt.secret=BonsoirCeciEstUneCleSecretePourMonSystemeDeAuthRbacAccessCoreRayaneBICABA
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000